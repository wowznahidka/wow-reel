<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>WOW Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}

.stage{
  position:relative;
  width:min(393px,100vw);
  height:min(852px,100vh);
  background:#000;
  overflow:hidden;
}

/* ── GRID ── */
.grid-el{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(124,92,255,.11) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,255,.11) 1px, transparent 1px);
  background-size:54px 54px;
  -webkit-mask:linear-gradient(to top,#000 25%,transparent 62%);
  mask:linear-gradient(to top,#000 25%,transparent 62%);
  opacity:0;transition:opacity 2s;
}
.grid-el.on{opacity:1}

/* ── GLOW ── */
.glow-main{
  position:absolute;z-index:1;pointer-events:none;
  bottom:-80px;left:50%;transform:translateX(-50%);
  width:120%;height:520px;
  background:radial-gradient(ellipse 65% 55% at 50% 100%,
    rgba(124,92,255,.75) 0%,
    rgba(100,60,255,.28) 38%,
    transparent 65%);
  opacity:0;transition:opacity 2.2s;
}
.glow-main.on{opacity:1}
.glow-cyan{
  position:absolute;z-index:1;pointer-events:none;
  bottom:-100px;left:50%;transform:translateX(-50%);
  width:80%;height:320px;
  background:radial-gradient(ellipse 55% 40% at 50% 100%,
    rgba(0,229,255,.13) 0%,transparent 58%);
  opacity:0;transition:opacity 2.2s .6s;
}
.glow-cyan.on{opacity:1}

/* ── SPARKLES ── */
.sparks{position:absolute;inset:0;z-index:2;pointer-events:none}
.spark{
  position:absolute;background:rgba(255,255,255,.95);border-radius:50%;opacity:0;
  animation:twinkle var(--d) ease-in-out infinite var(--dl);
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(.25)}
  50%{opacity:var(--op);transform:scale(1)}
}

/* ── SCENES ── */
.scene{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:56px 40px;
  opacity:0;pointer-events:none;transition:opacity .45s;
}
.scene.on{opacity:1;pointer-events:all}

/* ── S0 START ── */
#s0{gap:36px;z-index:100;background:#000}
.s0-brand{
  font-family:'Unbounded',sans-serif;font-size:38px;font-weight:900;
  letter-spacing:-.02em;line-height:1;
  background:linear-gradient(135deg,#7C5CFF,#00E5FF);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.s0-hint{font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.18em;text-transform:uppercase}
.play-btn{
  width:82px;height:82px;border-radius:50%;
  background:linear-gradient(135deg,#7C5CFF,#00E5FF);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 64px rgba(124,92,255,.65);
  transition:transform .15s;
}
.play-btn:active{transform:scale(.91)}
.play-btn svg{width:26px;height:26px;fill:#000;margin-left:5px}

/* ── S1 HOOK ── */
#s1{gap:6px}
.hook-line{
  font-family:'Inter',sans-serif;font-weight:900;font-size:58px;
  letter-spacing:-.03em;line-height:1.05;color:#fff;
  opacity:0;transform:translateY(32px);
  transition:opacity .6s,transform .65s cubic-bezier(.2,.8,.2,1);
}
.hook-line.g{
  background:linear-gradient(135deg,#7C5CFF,#00E5FF);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hook-line.in{opacity:1;transform:none}

/* ── S2 SERVICES ── */
#s2{gap:0;padding:48px 32px}
.svc{
  font-family:'Unbounded',sans-serif;font-weight:900;
  letter-spacing:-.02em;line-height:1;
  word-break:break-word;overflow-wrap:break-word;
  opacity:0;transform:translateY(36px) scale(.95);
  transition:opacity .55s,transform .6s cubic-bezier(.15,.9,.2,1.06);
}
.svc.s-big{font-size:58px;color:#fff}
.svc.s-grad{
  font-size:52px;
  background:linear-gradient(135deg,#7C5CFF,#00E5FF);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.svc.in{opacity:1;transform:none}
.svc-sep{
  width:28px;height:1.5px;margin:20px auto;
  background:linear-gradient(90deg,#7C5CFF,#00E5FF);
  opacity:0;transition:opacity .45s;
}
.svc-sep.in{opacity:1}

/* ── S3 LOGO ── */
#s3{gap:0}
.logo-wow{
  font-family:'Unbounded',sans-serif;font-size:116px;font-weight:900;
  letter-spacing:-.04em;line-height:1;
  background:linear-gradient(150deg,#9B7FFF 0%,#7C5CFF 45%,#00E5FF 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;transform:scale(.74);
  transition:opacity .75s,transform 1s cubic-bezier(.1,.9,.15,1.1);
}
.logo-wow.in{opacity:1;transform:scale(1)}
.logo-studio{
  font-family:'Inter',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:.55em;color:rgba(255,255,255,.22);text-transform:uppercase;
  margin-top:10px;
  opacity:0;transition:opacity .6s .35s;
}
.logo-studio.in{opacity:1}
.logo-line{
  width:40px;height:1.5px;
  background:linear-gradient(90deg,#7C5CFF,#00E5FF);
  margin:42px auto;
  opacity:0;transition:opacity .5s .5s;
}
.logo-line.in{opacity:1}
.logo-handle{
  font-family:'Inter',sans-serif;font-size:22px;font-weight:800;
  color:#00E5FF;letter-spacing:.04em;
  opacity:0;transition:opacity .55s .65s;
}
.logo-handle.in{opacity:1}

/* ── PROGRESS ── */
#pbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:200}
#pfill{height:100%;width:0;background:linear-gradient(90deg,#7C5CFF,#00E5FF)}
</style>
</head>
<body>
<div class="stage">

  <div class="grid-el" id="grid"></div>
  <div class="glow-main" id="glow"></div>
  <div class="glow-cyan" id="glowc"></div>
  <div class="sparks" id="sparks"></div>

  <!-- S0 START -->
  <div class="scene on" id="s0">
    <div class="s0-brand">WOW Studio</div>
    <button class="play-btn" onclick="startReel()" aria-label="Play">
      <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
    </button>
    <div class="s0-hint">↑ screen record → play</div>
  </div>

  <!-- S1 HOOK -->
  <div class="scene" id="s1">
    <div class="hook-line" id="h1">Твій сайт</div>
    <div class="hook-line g" id="h2">має продавати.</div>
  </div>

  <!-- S2 SERVICES -->
  <div class="scene" id="s2">
    <div class="svc s-grad" id="sv1">Лендінг</div>
    <div class="svc-sep" id="sp1"></div>
    <div class="svc s-big" id="sv2">Магазин</div>
    <div class="svc-sep" id="sp2"></div>
    <div class="svc s-grad" id="sv3">Авто&shy;матизація</div>
  </div>

  <!-- S3 LOGO -->
  <div class="scene" id="s3">
    <div class="logo-wow" id="lw">WOW</div>
    <div class="logo-studio" id="ls">Studio</div>
    <div class="logo-line" id="ll"></div>
    <div class="logo-handle" id="lh">@wowznahidka</div>
  </div>

  <div id="pbar"><div id="pfill"></div></div>
</div>

<script>
// Sparkles
(function(){
  const c = document.getElementById('sparks');
  const pts=[
    [8,7,.7],[91,11,.8],[16,19,.5],[84,15,.6],[5,36,.4],[95,32,.65],
    [22,54,.6],[78,60,.5],[11,72,.45],[89,68,.6],[28,86,.7],[72,82,.5],
    [42,9,.55],[58,13,.65],[50,3,.4],[35,44,.5],[65,40,.6],[48,94,.7],
    [14,92,.5],[86,89,.6],[3,55,.4],[97,50,.5],[52,26,.55],[38,76,.6],[62,70,.45]
  ];
  pts.forEach(([x,y,op],i)=>{
    const s=document.createElement('div');
    s.className='spark';
    const sz=1.4+(i%3)*.9;
    const d=1.3+(i*.19)%1.9;
    const dl=(i*.31)%3.2;
    s.style.cssText=`left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;--d:${d}s;--dl:-${dl}s;--op:${op}`;
    c.appendChild(s);
  });
})();

const TOTAL=15000;
let t0=null;
const done={};
const once=(k,fn)=>{if(!done[k]){done[k]=true;fn();}};

function show(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function addIn(...ids){ids.forEach(id=>document.getElementById(id)?.classList.add('in'));}

function startReel(){
  document.getElementById('grid').classList.add('on');
  document.getElementById('glow').classList.add('on');
  document.getElementById('glowc').classList.add('on');
  t0=performance.now();
  requestAnimationFrame(tick);
}

function tick(now){
  const e=now-t0;
  document.getElementById('pfill').style.width=(Math.min(e/TOTAL,1)*100)+'%';

  // S1: 0-5s
  if(e<5000){
    once('s1',()=>{
      show('s1');
      addIn('h1');
      setTimeout(()=>addIn('h2'),380);
    });
  }
  // S2: 5-10s
  else if(e<10000){
    once('s2',()=>{
      show('s2');
      setTimeout(()=>addIn('sv1'),60);
      setTimeout(()=>addIn('sp1'),260);
      setTimeout(()=>addIn('sv2'),420);
      setTimeout(()=>addIn('sp2'),620);
      setTimeout(()=>addIn('sv3'),780);
    });
  }
  // S3: 10-15s
  else{
    once('s3',()=>{
      show('s3');
      setTimeout(()=>addIn('lw'),80);
      setTimeout(()=>addIn('ls'),380);
      setTimeout(()=>addIn('ll'),560);
      setTimeout(()=>addIn('lh'),780);
    });
  }

  if(e<TOTAL) requestAnimationFrame(tick);
}
</script>
</body>
</html>
